name: Publish Tube Sheet Generator

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build static app
        run: pnpm build

      - name: Pack release bundle
        run: |
          cd dist
          zip -r ../tube-sheet-generator-static.zip .

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: tube-sheet-generator-static
          path: |
            dist
            tube-sheet-generator-static.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tube-sheet-generator-static.zip

  deploy-site:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: tube-sheet-generator-static

      - name: Deploy to cadautoscript.com
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          HOST_REPOSITORY: biosxxx/cadautoscript.com
          TARGET_DIRECTORY: static/utility-apps/tube-sheet-generator
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "DEPLOY_TOKEN is not configured; skipping host deployment."
            exit 0
          fi

          git config --global user.name "tube-sheet-generator-bot"
          git config --global user.email "bot@biosxxx.com"

          git clone --depth 1 "https://x-access-token:${DEPLOY_TOKEN}@github.com/${HOST_REPOSITORY}.git" site
          rm -rf "site/${TARGET_DIRECTORY}"
          mkdir -p "site/${TARGET_DIRECTORY}"
          cp -R dist/. "site/${TARGET_DIRECTORY}/"

          cd site
          git add "${TARGET_DIRECTORY}"
          if git diff --cached --quiet; then
            echo "No host site changes to deploy."
            exit 0
          fi

          git commit -m "Deploy tube sheet generator static app"
          git push origin main
