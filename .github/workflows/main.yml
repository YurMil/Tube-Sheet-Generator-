name: Publish Tube Sheet Generator

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-tube-sheet-generator
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build static app
        run: pnpm build

      - name: Pack release bundle
        run: |
          cd dist
          zip -r ../tube-sheet-generator-static.zip .

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: tube-sheet-generator-static
          path: |
            dist
            tube-sheet-generator-static.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tube-sheet-generator-static.zip

  deploy-site:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: tube-sheet-generator-static

      - name: Deploy to cadautoscript.com
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          HOST_REPOSITORY: YurMil/cadautoscript.com
          TARGET_DIRECTORY: static/utility-apps/tube-sheet-generator
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "DEPLOY_TOKEN is not configured; cannot deploy to ${HOST_REPOSITORY}."
            exit 1
          fi

          echo "Downloaded artifact contents:"
          find . -maxdepth 3 -type f | sort

          git config --global user.name "tube-sheet-generator-bot"
          git config --global user.email "bot@yurmil.com"

          git clone --depth 1 "https://x-access-token:${DEPLOY_TOKEN}@github.com/${HOST_REPOSITORY}.git" site
          rm -rf "site/${TARGET_DIRECTORY}"
          mkdir -p "site/${TARGET_DIRECTORY}"
          cp -R dist/. "site/${TARGET_DIRECTORY}/"

          cd site
          git add "${TARGET_DIRECTORY}"
          if git diff --cached --quiet; then
            echo "No host site changes to deploy."
            exit 0
          fi

          git commit -m "Deploy tube sheet generator static app"
          # Reconcile with any concurrent host-repo change before pushing so a
          # racing deploy fails the retry instead of the push.
          for attempt in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on origin/main..."
            git pull --rebase origin main
          done
          echo "Failed to push host site changes after 3 attempts." >&2
          exit 1
